<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arpi Ki Magical Holi ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }

        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #1a0033 0%, #000 100%); animation: pulseBg 8s infinite alternate; }
        @keyframes pulseBg { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(45deg); } }

        /* Huge Density Stars & Hearts */
        .stream-emoji { position: absolute; bottom: -60px; z-index: -1; opacity: 0.9; pointer-events: none; animation: streamUp var(--duration) linear infinite; }
        @keyframes streamUp { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            15% { opacity: 1; }
            100% { transform: translateY(-115vh) rotate(360deg); opacity: 0; } 
        }

        .slider { display: flex; width: 700vw; height: 100vh; transition: 1.2s cubic-bezier(0.85, 0, 0.15, 1); will-change: transform; }
        .section { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 15px; text-align: center; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 30px 20px; 
            border-radius: 30px; 
            width: 95%;
            max-width: 420px; 
            box-shadow: 0 0 40px rgba(255, 133, 162, 0.2); 
            z-index: 100; 
            min-height: 480px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }

        h2 { font-family: 'Dancing Script', cursive; font-size: 2.3rem; margin-bottom: 15px; color: #ff85a2; text-shadow: 0 0 10px rgba(255,133,162,0.5); }
        p { font-size: 1.05rem; line-height: 1.7; color: #fff; min-height: 140px; font-weight: 300; }

        .next-btn { 
            margin-top: 25px; 
            padding: 12px 35px; 
            border-radius: 30px; 
            border: none; 
            background: linear-gradient(45deg, #ff85a2, #ff1744); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 10px 20px rgba(255,23,68,0.3);
            font-size: 1rem;
        }

        .prediction-box { border: 2px solid gold; box-shadow: 0 0 30px gold; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 10px gold; } to { box-shadow: 0 0 40px gold; } }

        #music-btn { position: fixed; top: 20px; right: 20px; font-size: 25px; z-index: 1000; background: none; border: none; filter: drop-shadow(0 0 5px #fff); }
    </style>
</head>
<body onclick="playMusicOnInteraction()">

<div class="bg-glow"></div>
<button id="music-btn">🎵</button>
<audio id="player" loop src="music.mp3"></audio> 

<div class="slider" id="slider">
    <section class="section">
        <div class="glass-card">
            <h2>Suno Arpi... ❤️</h2>
            <p id="t1"></p>
            <button class="next-btn" onclick="go(1, 't2', 'Sach kahun toh Holi ke rang bhi aapki muskurahat ke saamne feeke lagte hain. Aapki ek smile meri poori duniya ko itna khoobsurat bana deti hai ki lagta hai jaise meri life ki Holi tabhi complete hoti hai jab aap khush hoti ho. Maine Mahadev se bas yahi maanga hai ki aapki ye chamak hamesha aise hi barkarar rahe..... ✨🧿')">Aage Chalein ➔</button>
        </div>
    </section>
    
    <section class="section">
        <div class="glass-card">
            <h2>Rang Aur Khushi 🌈</h2>
            <p id="t2"></p>
            <button class="next-btn" onclick="go(2, 't3', 'Jab se aap meri life mein aaye ho na… tab se meri duniya mein jaise naye naye rang bhar gaye hain. Aapki baatein, aapki hasi aur aapka saath mere har din ko ek chhote se festival jaisa bana dete hain. Aapke bina har rang adhoora hai, aur aapke saath mitti bhi gulal lagti hai.... 🌸💍')">Dil Ki Baat ➔</button>
        </div>
    </section>
    
    <section class="section">
        <div class="glass-card">
            <h2>For My Kaju Katli..❤️</h2>
            <p id="t3"></p>
            <button class="next-btn" onclick="go(3, 't4', 'Aapko shayad pata bhi nahi hai Arpi… par aap meri zindagi ki sabse khoobsurat feeling ho. Aapki khushi meri sabse badi strength hai, aur aapki muskurahat meri duniya ki sabse pyaari cheez hai. Bas aise hi hamesha mere saath rehna, kyunki aapke saath hi mera har sapna poora hota hai.... ❤️✨')">Hamesha Ke Liye ➔</button>
        </div>
    </section>

    <section class="section">
        <div class="glass-card">
            <h2>Hamari Wali Holi?❤️✨</h2>
            <p id="t4"></p>
            <button class="next-btn" onclick="go(4, 't5', 'ANALYZING DESTINY... 🔮 Connecting with Cosmic Energies... Scanning the bond of Vineet and Arpi. Mahadev is checking the records of pure love. Future is being written in the stars right now... Processing Prediction... ✨')">Check Prediction 🔮</button>
        </div>
    </section>

    <section class="section">
        <div class="glass-card prediction-box">
            <h2 style="color: gold;">SYSTEM PREDICTION 🔮</h2>
            <p id="t5" style="font-weight: bold; color: #ffea00;"></p>
            <button class="next-btn" onclick="go(5, 't6', 'Is Holi par main bas itna kehna chahta hoon… ki meri zindagi ka sabse pyara aur anmol rang hamesha aap hi rahoge. Aap mere sukoon ka doosra naam ho. I Love You Infinitely, Arpi! Hamesha aise hi mere dil ki rani bankar rehna.... ❤️🎨🧿')">Final Surprise 🎁</button>
        </div>
    </section>

    <section class="section">
        <div class="glass-card" style="border: 2px solid #ff85a2;">
            <h2 style="font-size: 2.6rem; color: #ff85a2;">I Love You, Arpi...!❤️</h2>
            <p id="t6" style="font-size: 1.15rem; font-weight: 600;"></p>
            <p style="margin-top: 15px; font-weight: bold; color: #ffea00;">Happy Holi, Meri Jaan...!❤️🧿✨</p>
            <p style="font-size: 0.85rem; opacity: 0.8; margin-top: 10px;">- Hamesha Ke Liye Aapka...Vineet❤️✨ 🔒</p>
        </div>
    </section>
</div>

<script>
    const slider = document.getElementById('slider');
    const audio = document.getElementById('player');
    let musicStarted = false;

    function playMusicOnInteraction() {
        if (!musicStarted) {
            audio.play().catch(() => {});
            musicStarted = true;
        }
    }

    function typeWriter(text, i, fnCallback) {
        if (i < text.length) {
            document.getElementById(fnCallback).innerHTML = text.substring(0, i+1);
            // Slower typing speed (60ms instead of 40ms)
            setTimeout(function() { typeWriter(text, i + 1, fnCallback) }, 60);
        }
    }

    window.onload = () => {
        typeWriter("Sach kahun toh Holi ke rang bhi aapki muskurahat ke saamne feeke lagte hain. Aapki ek smile meri poori duniya ko itna khoobsurat bana deti hai..... ✨", 0, "t1");
    };

    function go(idx, nextId, nextText) {
        playMusicOnInteraction();
        slider.style.transform = `translateX(-${idx * 100}vw)`;
        if(nextId && nextText) {
            document.getElementById(nextId).innerHTML = ""; 
            setTimeout(() => { 
                if(nextId === 't4') {
                    typeWriter("Hum kab saath mein Holi manayenge? Jab main aapko dher saare rangon se bhigo doon aur aap gusse mein mujhe pakdo... batao wo din kab aayega? Mere dil ko us din ka be-sabri se intezar hai jab hum ek doosre ko rang laga kar hamesha ke liye ek ho jayenge! 😂❤️", 0, "t4");
                } else if(nextId === 't5') {
                    typeWriter("CONGRATULATIONS! ❤️ AI ne Mahadev se baat ki hai aur unhone kaha hai ki Arpita aur Vineet agle saal se hamesha saath mein Holi manayenge! Ye naseeb mein likha ja chuka hai ki aapka saath janmo tak rahega! ✨🔱💍", 0, "t5");
                } else {
                    typeWriter(nextText, 0, nextId); 
                }
            }, 1000);
        }
    }

    function spawnEmoji() {
        const emojis = ['❤️', '✨', '💖', '⭐', '💗', '🧿'];
        const e = document.createElement('div');
        e.className = 'stream-emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.fontSize = (Math.random() * 20 + 15) + 'px';
        e.style.setProperty('--duration', (Math.random() * 3 + 6) + 's'); // Slow and smooth
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 9000);
    }
    // High density every 40ms
    setInterval(spawnEmoji, 40);

    function manualBlast(e) {
        const emojis = ['💖', '✨', '❤️', '🧿'];
        for(let i=0; i<35; i++) {
            const p = document.createElement('div');
            p.style.position = 'absolute'; p.style.zIndex = '150'; p.style.pointerEvents = 'none';
            p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            const ex = (Math.random() - 0.5) * 450;
            const ey = (Math.random() - 0.5) * 450;
            p.animate([ { transform: 'translate(0,0) scale(1)', opacity: 1 }, { transform: `translate(${ex}px, ${ey}px) scale(0) rotate(360deg)`, opacity: 0 } ], { duration: 2000, fill: 'forwards' });
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }
    }
</script>
</body>
</html>
