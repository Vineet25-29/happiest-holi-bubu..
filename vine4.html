<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arpi Ki Magical Holi ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* Cinematic Glowing BG */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #1a0033 0%, #000 100%); animation: pulseBg 8s infinite alternate; }
        @keyframes pulseBg { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(45deg); } }

        /* Heavy Down-to-Up Stream */
        .stream-emoji { position: absolute; bottom: -60px; z-index: -1; opacity: 0.8; pointer-events: none; animation: streamUp var(--duration) linear infinite; }
        @keyframes streamUp { 
            0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
            20% { opacity: 1; }
            100% { transform: translateY(-115vh) rotate(720deg); opacity: 0; } 
        }

        /* Slider */
        .slider { display: flex; width: 700vw; height: 100vh; transition: 1.2s cubic-bezier(0.85, 0, 0.15, 1); }
        .section { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px; text-align: center; }

        /* Glassmorphism Card */
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px 25px; border-radius: 40px; max-width: 90%; box-shadow: 0 0 50px rgba(255, 133, 162, 0.3); z-index: 100; min-height: 420px; display: flex; flex-direction: column; justify-content: center; position: relative; }

        h2 { font-family: 'Dancing Script', cursive; font-size: 2.6rem; margin-bottom: 20px; color: #ff85a2; text-shadow: 0 0 10px rgba(255,133,162,0.5); }
        p { font-size: 1.2rem; line-height: 1.7; color: #fff; min-height: 120px; }

        .next-btn { margin-top: 30px; padding: 14px 40px; border-radius: 35px; border: none; background: linear-gradient(45deg, #ff85a2, #ff1744); color: white; font-weight: bold; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px rgba(255,23,68,0.3); }
        .next-btn:hover { transform: scale(1.1); box-shadow: 0 15px 30px rgba(255,23,68,0.5); }

        /* Special Prediction Box */
        .prediction-box { border: 2px solid gold; box-shadow: 0 0 40px gold; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 15px gold; } to { box-shadow: 0 0 50px gold; } }

        #music-btn { position: fixed; top: 25px; right: 25px; font-size: 30px; z-index: 1000; cursor: pointer; animation: bounce 2s infinite; filter: drop-shadow(0 0 10px #ff85a2); }
    </style>
</head>
<body onclick="manualBlast(event)">

<div class="bg-glow"></div>
<button id="music-btn" onclick="toggleMusic(event)">🎵</button>
<audio id="player" loop src="music.mp3"></audio> <div class="slider" id="slider">
    <section class="section">
        <div class="glass-card">
            <h2>Suno Arpi... ❤️</h2>
            <p id="t1"></p>
            <button class="next-btn" onclick="go(1, 't2', 'Sach kahun toh Holi ke rang bhi aapki muskurahat ke saamne feeke lagte hain. Aapki ek smile meri poori duniya ko itna khoobsurat bana deti hai ki lagta hai jaise meri life ki Holi tabhi complete hoti hai jab aap khush hoti ho..... ✨')">Next ➔</button>
        </div>
    </section>
    
    <section class="section">
        <div class="glass-card">
            <h2>Rang Aur Khushi 🌈</h2>
            <p id="t2"></p>
            <button class="next-btn" onclick="go(2, 't3', 'Jab se aap meri life mein aaye ho na… tab se meri duniya mein jaise naye naye rang bhar gaye hain. Aapki baatein, aapki hasi aur aapka saath mere har din ko ek chhote se festival jaisa bana dete hain.... 🌸')">Aage Chalein ➔</button>
        </div>
    </section>
    
    <section class="section">
        <div class="glass-card">
            <h2>For My Kaju Katli..❤️✨ </h2>
            <p id="t3"></p>
            <button class="next-btn" onclick="go(3, 't4', 'Aapko shayad pata bhi nahi hai Arpi… par aap meri zindagi ki sabse khoobsurat feeling ho. Aapki khushi meri sabse badi strength hai, aur aapki muskurahat meri duniya ki sabse pyaari cheez hai.... ❤️✨')">Next ➔</button>
        </div>
    </section>

    <section class="section">
        <div class="glass-card">
            <h2>Hamari Wali Holi?❤️✨ </h2>
            <p id="t4"></p>
            <button class="next-btn" onclick="go(4, 't5', 'ANALYZING DESTINY... 🔮 System connecting with Mahadev\'s Blessings... Vineet ❤️ Arpi. Processing Future... ✨')">Check Prediction 🔮</button>
        </div>
    </section>

    <section class="section">
        <div class="glass-card prediction-box">
            <h2 style="color: gold;">SYSTEM PREDICTION 🔮</h2>
            <p id="t5" style="font-weight: bold; color: #ffea00;"></p>
            <button class="next-btn" onclick="go(5, 't6', 'Is Holi par main bas itna kehna chahta hoon… Meri zindagi ka sabse pyara rang hamesha aap hi rahoge. I Love You Infinitely, Arpi! ❤️🎨🧿')">Final Magic ➔</button>
        </div>
    </section>

    <section class="section">
        <div class="glass-card" style="border: 2px solid #ff85a2;">
            <h2 style="font-size: 3.2rem; color: #ff85a2;">I Love You, Arpi...!❤️✨ </h2>
            <p id="t6" style="font-size: 1.3rem; font-weight: 600;"></p>
            <p style="margin-top: 20px; font-weight: bold; color: #ffea00;">Happy Holi, Meri Jaan...!❤️🧿✨</p>
            <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">- Hamesha Ke Liye Aapka...Vineet❤️✨  🔒</p>
        </div>
    </section>
</div>

<script>
    const slider = document.getElementById('slider');
    const audio = document.getElementById('player');
    
    function typeWriter(text, i, fnCallback) {
        if (i < text.length) {
            document.getElementById(fnCallback).innerHTML = text.substring(0, i+1);
            setTimeout(function() { typeWriter(text, i + 1, fnCallback) }, 40);
        }
    }

    window.onload = () => {
        typeWriter("Sach kahun toh Holi ke rang bhi aapki muskurahat ke saamne feeke lagte hain.... ✨", 0, "t1");
    };

    function go(idx, nextId, nextText) {
        slider.style.transform = `translateX(-${idx * 100}vw)`;
        if(nextId && nextText) {
            document.getElementById(nextId).innerHTML = ""; 
            setTimeout(() => { 
                if(nextId === 't4') {
                    typeWriter("Hum kab saath mein Holi manayenge? Jab main aapko dher saare rangon se bhigo doon aur aap gusse mein mujhe pakdo... batao wo din kab aayega? 😂❤️", 0, "t4");
                } else if(nextId === 't5') {
                    typeWriter("CONGRATULATIONS! ❤️ AI ne Mahadev se baat ki hai aur unhone kaha hai ki Arpita aur Vineet agle saal se hamesha saath mein Holi manayenge! ✨🔱💍", 0, "t5");
                } else {
                    typeWriter(nextText, 0, nextId); 
                }
            }, 1000);
        }
    }

    function toggleMusic(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); }

    // INCREASED DENSITY Down-to-Up Stream
    function spawnEmoji() {
        const emojis = ['❤️', '✨', '🧿', '🌸', '🎨', '🌈', '💖', '💍', '🔱', '🍭'];
        const e = document.createElement('div');
        e.className = 'stream-emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.fontSize = (Math.random() * 30 + 15) + 'px';
        e.style.setProperty('--duration', (Math.random() * 3 + 3) + 's');
        document.body.appendChild(e);
        setTimeout(() => e.remove(), 6000);
    }
    setInterval(spawnEmoji, 60); // Har 60ms pe ek naya emoji

    function manualBlast(e) {
        const emojis = ['💖', '🎨', '✨', '🧿', '❤️'];
        for(let i=0; i<40; i++) {
            const p = document.createElement('div');
            p.style.position = 'absolute'; p.style.zIndex = '150'; p.style.pointerEvents = 'none';
            p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            const ex = (Math.random() - 0.5) * 600;
            const ey = (Math.random() - 0.5) * 600;
            p.animate([ { transform: 'translate(0,0) scale(1)', opacity: 1 }, { transform: `translate(${ex}px, ${ey}px) scale(0) rotate(360deg)`, opacity: 0 } ], { duration: 2000, fill: 'forwards' });
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }
    }
</script>
</body>
</html>
